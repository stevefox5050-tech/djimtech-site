
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Djimtech | Coach & Formateur IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #020617;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg);
        color: #f8fafc;
        overflow-x: hidden;
      }
      .font-outfit {
        font-family: 'Outfit', sans-serif;
      }
      .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glow-emerald { box-shadow: 0 0 40px -10px rgba(16, 185, 129, 0.2); }
      .glow-blue { box-shadow: 0 0 40px -10px rgba(59, 130, 246, 0.2); }
      .glow-purple { box-shadow: 0 0 40px -10px rgba(168, 85, 247, 0.2); }
      
      .text-gradient {
        background: linear-gradient(to right, #f8fafc, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .level-line {
        background: linear-gradient(to bottom, #10b981 0%, #3b82f6 50%, #a855f7 100%);
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
      
      .bg-dot-grid {
        background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
    </style>
  <script type="importmap">

}
